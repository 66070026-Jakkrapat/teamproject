<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Agent UI</title>
  <link rel="stylesheet" href="/ui/styles.css" />
</head>
<body>
  <div class="wrap">
    <h1>AI Agent: Scraping + OCR + Dual RAG + Tavily + Eval</h1>

    <div class="card">
      <h2>External Pipeline</h2>
      <div class="row">
        <input id="kw" placeholder="keyword เช่น SME ไทย รายงานประจำปี" />
        <input id="amt" type="number" value="3" min="1" max="10" />
        <button id="btnStart">Start Pipeline</button>
        <a class="link" href="/ui/workflow" target="_blank">Open Workflow UI</a>
      </div>
      <pre id="pipeOut"></pre>
    </div>

    <div class="card">
      <h2>Ask Agent</h2>
      <div class="row">
        <input id="q" placeholder="ถามคำถาม..." />
        <input id="topk" type="number" value="8" min="1" max="30" />
        <button id="btnAsk">Ask</button>
      </div>
      <pre id="answer"></pre>
      <h3>Retrieved chunks meta</h3>
      <pre id="chunks"></pre>
      <h3>Tavily results (if used)</h3>
      <pre id="tavily"></pre>
    </div>

    <div class="card">
      <h2>RAG Preview</h2>
      <div class="row">
        <select id="ns">
          <option value="external">external</option>
          <option value="internal">internal</option>
        </select>
        <input id="stype" placeholder="source_type (optional)" />
        <input id="limit" type="number" value="20" min="1" max="200" />
        <button id="btnPrev">Preview</button>
      </div>
      <pre id="preview"></pre>
    </div>
  </div>

  <script src="/ui/app.js"></script>
</body>
</html>
