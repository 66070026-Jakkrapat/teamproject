services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: ai_agent_pgvector
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "2026"
      POSTGRES_DB: ragdb
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
